      - name: Upload to Rukaze Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 21
          protocol: ftp
          # 'loose' helps when servers have strict firewalls or older certificates
          security: loose
          local-dir: ./app/build/outputs/apk/debug/
          server-dir: ./public_html/downloads/

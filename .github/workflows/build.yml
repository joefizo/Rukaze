name: Remote Affiliate Build

on:
  repository_dispatch:
    types: [build-apk]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          mkdir temp_zip
          unzip -q Rukaze_App.zip -d temp_zip
          GRADLEW_PATH=$(find temp_zip -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then exit 1; fi
          cp -rn $(dirname "$GRADLEW_PATH")/* .
          rm -rf temp_zip

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build with Gradle
        run: |
          ./gradlew assembleDebug \
            -PAFF_ID=${{ github.event.client_payload.aff_id }} \
            -PAPK_OWNER="${{ github.event.client_payload.apk_owner }}" \
            --no-daemon
            
      - name: Rename, Generate Checksum & Assetlinks
        run: |
          mkdir -p final_apk
          
          # Capture owner slug passed from PHP
          OWNER_SLUG="${{ github.event.client_payload.apk_owner }}"
          if [ -z "$OWNER_SLUG" ]; then
            OWNER_SLUG="RUKAZE_COM"
          fi

          TARGET_APK="final_apk/${OWNER_SLUG}.apk"
          rm -f "$TARGET_APK"
          mv app/build/outputs/apk/debug/app-debug.apk "$TARGET_APK"
          
          # Generate checksum
          cd final_apk
          sha256sum "${OWNER_SLUG}.apk" > "${OWNER_SLUG}.apk.sha256"
          cd ..

          # Extract APK signature SHA-256 fingerprint
          BUILD_TOOLS_PATH=$(find $ANDROID_SDK_ROOT/build-tools -maxdepth 1 | sort | tail -n 1)
          APKSIGNER="$BUILD_TOOLS_PATH/apksigner"
          
          if [ ! -f "$APKSIGNER" ]; then
            echo "Error: apksigner not found!"
            exit 1
          fi

          SHA256_FINGERPRINT=$($APKSIGNER verify --print-certs "$TARGET_APK" | grep -i "SHA-256 digest:" | head -n 1 | awk '{print $NF}')
          
          if [ -z "$SHA256_FINGERPRINT" ]; then
            echo "Error: Could not extract SHA256 fingerprint from APK!"
            exit 1
          fi
          
          echo "Extracted SHA-256 Fingerprint: $SHA256_FINGERPRINT"

          # Generate individual assetlinks file matching PHP's expected name: {apk_owner}_assetlinks.json
          cat << EOF > "final_apk/${OWNER_SLUG}_assetlinks.json"
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "joefizo.rukaze.com",
              "sha256_cert_fingerprints": ["$SHA256_FINGERPRINT"]
            }
          }]
          EOF

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          files: |
            final_apk/*.apk
            final_apk/*.sha256
            final_apk/*_assetlinks.json
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

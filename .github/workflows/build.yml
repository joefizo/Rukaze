name: Remote Affiliate Build

on:
  repository_dispatch:
    types: [build-apk]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          mkdir temp_zip
          unzip -q Rukaze_App.zip -d temp_zip
          GRADLEW_PATH=$(find temp_zip -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then exit 1; fi
          cp -rn $(dirname "$GRADLEW_PATH")/* .
          rm -rf temp_zip

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build with Gradle
        run: |
          ./gradlew assembleDebug \
            -PAFF_ID=${{ github.event.client_payload.aff_id }} \
            -PAPK_OWNER="${{ github.event.client_payload.apk_owner }}" \
            --no-daemon
            
      - name: Rename, Generate Checksum & Assetlinks
        run: |
          mkdir -p final_apk
          
          # 1. Rename the built APK using the owner's name
          mv app/build/outputs/apk/debug/app-debug.apk final_apk/${{ github.event.client_payload.apk_owner }}.apk
          
          # 2. Generate the SHA-256 Checksum file for verification
          cd final_apk
          sha256sum ${{ github.event.client_payload.apk_owner }}.apk > ${{ github.event.client_payload.apk_owner }}.apk.sha256
          
          # 3. Generate assetlinks.json with placeholder fingerprint (Skipped local keytool check)
          cat << 'EOF' > assetlinks.json
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "joefizo.rukaze.com",
              "sha256_cert_fingerprints": ["AA:BB:CC:DD:EE:FF:00:11:22:33:44:55:66:77:88:99:AA:BB:CC:DD:EE:FF:00:11:22:33:44:55:66:77:88:99"]
            }
          }]
          EOF

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          files: |
            final_apk/${{ github.event.client_payload.apk_owner }}.apk
            final_apk/${{ github.event.client_payload.apk_owner }}.apk.sha256
            final_apk/assetlinks.json
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Remote Affiliate Build

on:
  repository_dispatch:
    types: [build-apk]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          mkdir temp_zip
          unzip -q Rukaze_App.zip -d temp_zip
          GRADLEW_PATH=$(find temp_zip -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then exit 1; fi
          cp -rn $(dirname "$GRADLEW_PATH")/* .
          rm -rf temp_zip

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build with Gradle
        run: |
          ./gradlew assembleDebug \
            -PAFF_ID=${{ github.event.client_payload.aff_id }} \
            -PAPK_OWNER="${{ github.event.client_payload.apk_owner }}" \
            --no-daemon
            
      - name: Rename, Generate Checksum & Assetlinks
        run: |
          mkdir -p final_apk
          
          # 1. Dynamically capture the requested APK name from the payload, fallback to rukaze
          APP_NAME="${{ github.event.client_payload.apk_owner }}"
          if [ -z "$APP_NAME" ]; then
            APP_NAME="rukaze"
          fi
          
          TARGET_APK="final_apk/${APP_NAME}.apk"
          rm -f "$TARGET_APK"
          mv app/build/outputs/apk/debug/app-debug.apk "$TARGET_APK"
          
          # 2. Generate the SHA-256 Checksum file for verification
          cd final_apk
          sha256sum "${APP_NAME}.apk" > "${APP_NAME}.apk.sha256"
          cd ..

          # 3. Automatically extract the actual APK signature SHA-256 fingerprint
          BUILD_TOOLS_PATH=$(find $ANDROID_SDK_ROOT/build-tools -maxdepth 1 | sort | tail -n 1)
          APKSIGNER="$BUILD_TOOLS_PATH/apksigner"
          
          if [ ! -f "$APKSIGNER" ]; then
            echo "Error: apksigner not found!"
            exit 1
          fi

          SHA256_FINGERPRINT=$($APKSIGNER verify --print-certs "$TARGET_APK" | grep -i "SHA-256 digest:" | head -n 1 | awk '{print $NF}')
          
          if [ -z "$SHA256_FINGERPRINT" ]; then
            echo "Error: Could not extract SHA256 fingerprint from APK!"
            exit 1
          fi
          
          echo "Extracted SHA-256 Fingerprint: $SHA256_FINGERPRINT"

          # 4. Generate assetlinks.json dynamically using the extracted fingerprint
          cat << EOF > final_apk/assetlinks.json
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "joefizo.rukaze.com",
              "sha256_cert_fingerprints": ["$SHA256_FINGERPRINT"]
            }
          }]
          EOF

      - name: Refresh Git Tag v1.0
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -d v1.0 || true
          git push origin :refs/tags/v1.0 || true
          
          git tag v1.0
          git push origin v1.0

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          files: |
            final_apk/*.apk
            final_apk/*.sha256
            final_apk/assetlinks.json
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

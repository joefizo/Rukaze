name: Remote Affiliate Build
on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          # Create a temp folder to unzip
          mkdir temp_zip
          unzip Rukaze_App.zip -d temp_zip
          
          # Find where the actual Android project starts (where gradlew is)
          SOURCE_DIR=$(find temp_zip -name "gradlew" -exec dirname {} \;)
          
          # Move everything from that directory to the main work area
          cp -rn $SOURCE_DIR/* .
          rm -rf temp_zip

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build with Gradle
        # Using --no-daemon to prevent memory issues in the cloud
        run: ./gradlew assembleDebug -PAFF_ID=${{ github.event.client_payload.aff_id }} --no-daemon

      - name: Upload to Rukaze Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          # This points to the standard Android build output folder
          local-dir: ./app/build/outputs/apk/debug/
          server-dir: ./public_html/downloads/

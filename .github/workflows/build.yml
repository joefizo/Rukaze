name: Remote Affiliate Build
on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          mkdir temp_zip
          unzip Rukaze_App.zip -d temp_zip
          SOURCE_DIR=$(find temp_zip -name "gradlew" -exec dirname {} \;)
          cp -rn $SOURCE_DIR/* .
          rm -rf temp_zip

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Surgical Manifest Fix
        run: |
          sed -i '/<queries>/,/<\/queries>/d' app/src/main/AndroidManifest.xml
          if ! grep -q "</manifest>" app/src/main/AndroidManifest.xml; then
            echo "</manifest>" >> app/src/main/AndroidManifest.xml
          fi

      - name: Make Gradlew Executable
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build with Gradle
        run: ./gradlew assembleDebug -PAFF_ID=${{ github.event.client_payload.aff_id }} --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${{ github.event.client_payload.aff_id }}.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          files: app/build/outputs/apk/debug/${{ github.event.client_payload.aff_id }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Remote Affiliate Build
on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          mkdir temp_zip
          unzip Rukaze_App.zip -d temp_zip
          SOURCE_DIR=$(find temp_zip -name "gradlew" -exec dirname {} \;)
          cp -rn $SOURCE_DIR/* .
          rm -rf temp_zip

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Surgical Manifest Fix
        run: |
          sed -i '/<queries>/,/<\/queries>/d' app/src/main/AndroidManifest.xml
          if ! grep -q "</manifest>" app/src/main/AndroidManifest.xml; then
            echo "</manifest>" >> app/src/main/AndroidManifest.xml
          fi

      - name: Make Gradlew Executable
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build with Gradle
        run: ./gradlew assembleDebug -PAFF_ID=${{ github.event.client_payload.aff_id }} --no-daemon

      # --- THIS CREATES THE DOWNLOAD LINK ON GITHUB ---
      - name: Upload APK to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: Rukaze-Affiliate-APK-${{ github.event.client_payload.aff_id }}
          path: app/build/outputs/apk/debug/*.apk

      # Keep this as a backup, but it's okay if it fails
      - name: Upload to Rukaze Server
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          security: loose
          local-dir: ./app/build/outputs/apk/debug/
          server-dir: /

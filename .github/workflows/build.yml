name: Remote Affiliate Build
on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          mkdir temp_zip
          unzip Rukaze_App.zip -d temp_zip
          SOURCE_DIR=$(find temp_zip -name "gradlew" -exec dirname {} \;)
          cp -rn $SOURCE_DIR/* .
          rm -rf temp_zip

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Android Build Tools
        # This fixes the <queries> error by providing modern build tools
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3"

      - name: Make Gradlew Executable
        run: |
          chmod +x gradlew
          # Also ensure a local.properties exists for the SDK path
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build with Gradle
        # Added -Pandroid.builder.sdkDownload=true to help Gradle find the tools
        run: ./gradlew assembleDebug -PAFF_ID=${{ github.event.client_payload.aff_id }} -Pandroid.builder.sdkDownload=true --no-daemon

      - name: Upload to Rukaze Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./app/build/outputs/apk/debug/
          server-dir: ./public_html/downloads/

name: Remote Affiliate Build
on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          mkdir temp_zip
          unzip Rukaze_App.zip -d temp_zip
          SOURCE_DIR=$(find temp_zip -name "gradlew" -exec dirname {} \;)
          cp -rn $SOURCE_DIR/* .
          rm -rf temp_zip

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Fix Manifest (Safe Clean)
        # This replaces the <queries> tags with empty space instead of deleting lines
        # This prevents the "XML structure" error you just saw.
        run: |
          sed -i 's/<queries>//g' app/src/main/AndroidManifest.xml

      - name: Make Gradlew Executable
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build with Gradle
        run: ./gradlew assembleDebug -PAFF_ID=${{ github.event.client_payload.aff_id }} --no-daemon

      - name: Upload to Rukaze Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./app/build/outputs/apk/debug/
          server-dir: ./public_html/downloads/
